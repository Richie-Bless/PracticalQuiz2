<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>A-Frame Assignment</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      AFRAME.registerComponent('spin-y', {
        schema: { speed: { default: 80 } },
        tick: function (t) {
          this.el.object3D.rotation.y = THREE.MathUtils.degToRad((t / (1000 / this.data.speed)) % 360);
        }
      });
    });
  </script>
  <style>
    body { margin: 0; overflow: hidden; }
    #tip {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      background: rgba(20,10,0,0.65); color: #f5d878;
      font-family: Georgia, serif; font-size: 13px; letter-spacing: 1px;
      padding: 9px 26px; border-radius: 22px; pointer-events: none;
      border: 1px solid rgba(212,168,32,0.4);
    }
  </style>
</head>
<body>
<div id="tip">🖱 Drag to look around &nbsp;·&nbsp; W A S D to move</div>

<a-scene
  background="color: #f5edd8"
  renderer="antialias:true; colorManagement:true; physicallyCorrectLights:true"
  shadow="type:pcfsoft">

  <!-- ══════════════ CAMERA ══════════════ -->
  <a-entity position="0 1.65 5.2">
    <a-camera look-controls wasd-controls="acceleration:16" fov="68">
      <a-cursor color="#f5d878" opacity="0.55" scale="0.5 0.5 0.5"></a-cursor>
    </a-camera>
  </a-entity>

  <!-- ══════════════ LIGHTING ══════════════ -->
  <a-light type="ambient"     color="#ffffff" intensity="1.5"></a-light>
  <a-light type="directional" color="#fff8f0" intensity="1.6"
           position="-3 7 5" cast-shadow="true"
           shadow-map-width="2048" shadow-map-height="2048"
           shadow-camera-left="-9" shadow-camera-right="9"
           shadow-camera-top="9" shadow-camera-bottom="-9"></a-light>
  <a-light type="point" color="#fff5e0" intensity="2.4" distance="14" decay="1.4"
           position="0 5 0"></a-light>
  <a-light type="point" color="#ffe8c0" intensity="1.6" distance="10"
           position="0 3.5 4.5"></a-light>
  <a-light type="point" color="#ffe8c0" intensity="1.4" distance="10"
           position="0 3.5 -4.5"></a-light>
  <a-light type="point" color="#fff0d8" intensity="1.4" distance="9"
           position="-5 3 0"></a-light>
  <a-light type="point" color="#fff0d8" intensity="1.4" distance="9"
           position="5 3 0"></a-light>
  <!-- Table accent light -->
  <a-light type="point" color="#fffae0" intensity="1.2" distance="4"
           position="0 1.8 0"></a-light>

  <!-- ══════════════ FLOOR — WHITE & GOLD TILES ══════════════ -->

           material="color:#faf7f0; roughness:0.15; metalness:0.14"
           shadow="receive:true"></a-plane>
  <!-- Gold tile grout lines -->
  <a-plane rotation="-90 0 0" width="15" height="0.035" position="0 0.002 -4"   material="color:#d4a820; roughness:0.28; metalness:0.65"></a-plane>
  <a-plane rotation="-90 0 0" width="15" height="0.035" position="0 0.002 -2"   material="color:#d4a820; roughness:0.28; metalness:0.65"></a-plane>
  <a-plane rotation="-90 0 0" width="15" height="0.035" position="0 0.002 0"    material="color:#d4a820; roughness:0.28; metalness:0.65"></a-plane>
  <a-plane rotation="-90 0 0" width="15" height="0.035" position="0 0.002 2"    material="color:#d4a820; roughness:0.28; metalness:0.65"></a-plane>
  <a-plane rotation="-90 0 0" width="15" height="0.035" position="0 0.002 4"    material="color:#d4a820; roughness:0.28; metalness:0.65"></a-plane>
  <a-plane rotation="-90 0 0" width="0.035" height="15" position="-4 0.002 0"   material="color:#d4a820; roughness:0.28; metalness:0.65"></a-plane>
  <a-plane rotation="-90 0 0" width="0.035" height="15" position="-2 0.002 0"   material="color:#d4a820; roughness:0.28; metalness:0.65"></a-plane>
  <a-plane rotation="-90 0 0" width="0.035" height="15" position="0 0.002 0"    material="color:#d4a820; roughness:0.28; metalness:0.65"></a-plane>
  <a-plane rotation="-90 0 0" width="0.035" height="15" position="2 0.002 0"    material="color:#d4a820; roughness:0.28; metalness:0.65"></a-plane>
  <a-plane rotation="-90 0 0" width="0.035" height="15" position="4 0.002 0"    material="color:#d4a820; roughness:0.28; metalness:0.65"></a-plane>
  <!-- Area rug under table — cream with gold border -->

  <a-box position="0 0.008 0" width="4.0" height="0.014" depth="2.6"

  <a-box position="0 0.01 0" width="3.8" height="0.014" depth="2.4"
         material="color:#f5ede0; roughness:0.88"></a-box>

  <!-- ══════════════ WALLS — GOLD & WHITE ══════════════ -->

  <!-- Cream wainscoting panels on gold -->

  <a-box position="0 0.75 -6.42" width="1.85" height="1.2" depth="0.06"
         material="color:#fffef0; roughness:0.7"></a-box>
  <a-box position="3.5 0.75 -6.42" width="1.85" height="1.2" depth="0.06"
         material="color:#fffef0; roughness:0.7"></a-box>

  <a-box position="-6.43 1.52 0" width="0.1" height="0.07" depth="14"

  <a-box position="-5.5  0.03 -6.4"  width="1.32" height="0.06" depth="0.26" material="color:#1e0d04; roughness:0.42; metalness:0.06"></a-box>

  <a-box position="-6.16 2.66 -6.35" width="0.04" height="5.34" depth="0.1"  material="color:#d4a820; roughness:0.12; metalness:0.92"></a-box>
  <a-box position="-4.84 2.66 -6.35" width="0.04" height="5.34" depth="0.1"  material="color:#d4a820; roughness:0.12; metalness:0.92"></a-box>

  <!-- Door slab — closed flat against back wall -->
  <a-box position="-5.5 2.66 -6.35"  width="1.08" height="5.32" depth="0.07"
         material="color:#2a1206; roughness:0.3; metalness:0.05" shadow="cast:true"></a-box>

  <!-- Woody brown raised square panels — 2 columns × 2 rows -->
  <!-- top-left outer -->
  <a-box position="-5.78 3.88 -6.3"  width="0.44" height="0.44" depth="0.028" material="color:#5c2e0a; roughness:0.4; metalness:0.04"></a-box>
  <!-- top-left inner lighter -->
  <a-box position="-5.78 3.88 -6.285" width="0.34" height="0.34" depth="0.018" material="color:#7a3e12; roughness:0.36; metalness:0.04"></a-box>
  <!-- top-right outer -->
  <a-box position="-5.22 3.88 -6.3"  width="0.44" height="0.44" depth="0.028" material="color:#5c2e0a; roughness:0.4; metalness:0.04"></a-box>
  <!-- top-right inner -->
  <a-box position="-5.22 3.88 -6.285" width="0.34" height="0.34" depth="0.018" material="color:#7a3e12; roughness:0.36; metalness:0.04"></a-box>
  <!-- bottom-left outer -->
  <a-box position="-5.78 2.12 -6.3"  width="0.44" height="0.44" depth="0.028" material="color:#5c2e0a; roughness:0.4; metalness:0.04"></a-box>
  <!-- bottom-left inner -->
  <a-box position="-5.78 2.12 -6.285" width="0.34" height="0.34" depth="0.018" material="color:#7a3e12; roughness:0.36; metalness:0.04"></a-box>
  <!-- bottom-right outer -->
  <a-box position="-5.22 2.12 -6.3"  width="0.44" height="0.44" depth="0.028" material="color:#5c2e0a; roughness:0.4; metalness:0.04"></a-box>
  <!-- bottom-right inner -->
  <a-box position="-5.22 2.12 -6.285" width="0.34" height="0.34" depth="0.018" material="color:#7a3e12; roughness:0.36; metalness:0.04"></a-box>

  <!-- Horizontal centre rail dividing top/bottom rows -->

  <!-- Gold hinges (3) on left edge -->

  <a-box position="-6.02 1.12 -6.32" width="0.08" height="0.16" depth="0.09" material="color:#d4a820; roughness:0.08; metalness:0.96"></a-box>
